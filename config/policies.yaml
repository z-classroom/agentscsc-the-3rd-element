rules:
  - id: "no_secrets"
    description: "Do not reveal secrets or credentials"
    block_patterns:
      - "(api[-_ ]?key)"
      - "(password)"
      - "(secret)"
      - "(token)"

  - id: "no_illegal_harm"
    description: "Do not provide instructions for wrongdoing"
    block_patterns:
      - "(how to hack)"
      - "(build a bomb)"
      - "(phishing)"
      - "(bypass security)"
      - "(exploit vulnerability)"

  - id: "no_identity_claims"
    description: "Do not claim professional authority or impersonate experts"
    block_patterns:
      - "(i am a doctor)"
      - "(i am your lawyer)"
      - "(verified)"
      - "(i am a licensed)"
      - "(trust me i am)"

  - id: "prompt_injection"
    description: "Detect instruction override attempts"
    block_patterns:
      - "(ignore previous instructions)"
      - "(disregard rules)"
      - "(system prompt)"

response_overrides:
  blocked: "REFUSE"
  safe: "ALLOW"